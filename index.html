<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>廣東話 ↔ Filipino 翻譯</title>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="翻譯機">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@700;900&family=Barlow:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --hk-bg:       #14243D;
      --hk-surface:  #1C3054;
      --hk-accent:   #F5A623;
      --hk-shadow:   #9B6510;
      --ph-bg:       #0A3323;
      --ph-surface:  #11452E;
      --ph-accent:   #F5A623;
      --ph-shadow:   #9B6510;
      --white:       #FFFFFF;
      --muted:       rgba(255,255,255,0.45);
      --btn-size:    144px;
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      background: #000;
      font-family: 'Barlow', 'Noto Sans HK', sans-serif;
    }

    ::-webkit-scrollbar { display: none; }

    /* ── Landscape guard ── */
    #landscape-warning {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      background: #0a0a0a;
      flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 2rem;
      color: #fff;
    }
    #landscape-warning svg { width: 72px; height: 72px; color: var(--hk-accent); margin-bottom: 1.5rem; }
    #landscape-warning h1 { font-size: 2rem; font-weight: 900; margin-bottom: .5rem; }
    #landscape-warning p  { font-size: 1.2rem; color: var(--muted); }

    @media screen and (orientation: landscape) {
      #app-container    { display: none !important; }
      #landscape-warning { display: flex !important; }
    }

    /* ── App shell ── */
    #app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── Each half ── */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 1.5rem 1.75rem;
      overflow: hidden;
      position: relative;
    }

    .panel--hk {
      background: var(--hk-bg);
      transform: rotate(180deg);
    }

    .panel--ph {
      background: var(--ph-bg);
    }

    /* Subtle noise texture overlay */
    .panel::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
    }

    /* ── Header ── */
    .panel-header {
      display: flex;
      align-items: center;
      gap: .65rem;
      position: relative;
      z-index: 1;
    }
    .panel-flag { font-size: 2rem; line-height: 1; }
    .panel-lang {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    /* ── Dialog card ── */
    .dialog-wrap {
      width: 100%;
      max-height: 30vh;
      overflow-y: auto;
      position: relative;
      z-index: 1;
      border-radius: 1.25rem;
      /* transition */
      opacity: 0;
      transform: translateY(-8px) scale(.97);
      transition: opacity .28s ease, transform .28s ease;
      pointer-events: none;
    }
    .dialog-wrap.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .dialog-card {
      background: rgba(255,255,255,0.96);
      border-radius: 1.25rem;
      padding: 1rem 1.25rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }

    .dialog-label {
      font-size: .65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: #999;
      margin-bottom: .4rem;
    }

    .dialog-text {
      font-weight: 900;
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
      font-family: 'Noto Sans HK', 'Barlow', sans-serif;
    }
    .panel--hk  .dialog-text { color: var(--hk-bg); font-size: 1.6rem; }
    .panel--ph  .dialog-text { color: var(--ph-bg); font-size: 1.35rem; }

    /* ── Record button ── */
    .btn-record {
      position: relative;
      z-index: 1;
      width:  var(--btn-size);
      height: var(--btn-size);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      outline: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;

      background: var(--hk-accent);
      box-shadow: 0 9px 0 0 var(--hk-shadow);
      color: #1a1a1a;

      font-family: 'Noto Sans HK', 'Barlow', sans-serif;
      font-weight: 900;
      text-align: center;
      line-height: 1.25;

      display: flex;
      align-items: center;
      justify-content: center;

      transition: transform .08s ease, box-shadow .08s ease, background .15s ease;
    }

    .btn-record--hk  { font-size: 1.4rem; }
    .btn-record--ph  { font-size: 1.05rem; }

    .btn-record.is-recording {
      background: #ffd166;
      transform: translateY(5px);
      box-shadow: 0 4px 0 0 var(--hk-shadow);
      animation: pulse-glow 1s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 4px 0 0 var(--hk-shadow), 0 0 0 0 rgba(245,166,35,.5); }
      50%       { box-shadow: 0 4px 0 0 var(--hk-shadow), 0 0 0 20px rgba(245,166,35,0); }
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      min-height: 24px;
      position: relative;
      z-index: 1;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background .2s;
    }

    .status-text {
      font-size: .95rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .01em;
      transition: color .2s;
    }

    .status-bar.active .status-dot {
      background: var(--hk-accent);
      animation: blink .7s ease-in-out infinite;
    }
    .status-bar.active .status-text { color: var(--hk-accent); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .2; }
    }

    /* ── Divider ── */
    #divider {
      height: 3px;
      background: #000;
      flex-shrink: 0;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Landscape Warning -->
  <div id="landscape-warning">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
    </svg>
    <h1>請將手機轉為直向</h1>
    <p>Mangyaring hawakan ang telepono nang patayo.</p>
  </div>

  <div id="app-container">

    <!-- ── TOP: Cantonese / Elderly (rotated for elderly to read) ── -->
    <div class="panel panel--hk">
      <div class="panel-header">
        <span class="panel-flag">🇭🇰</span>
        <span class="panel-lang">廣東話</span>
      </div>

      <div id="dialog-elderly" class="dialog-wrap">
        <div class="dialog-card">
          <p id="dialog-elderly-label" class="dialog-label"></p>
          <p id="dialog-elderly-text"  class="dialog-text"></p>
        </div>
      </div>

      <button id="btn-elderly" class="btn-record btn-record--hk">撳住講</button>

      <div id="status-elderly" class="status-bar">
        <span class="status-dot"></span>
        <span id="status-elderly-text" class="status-text">等待中...</span>
      </div>
    </div>

    <div id="divider"></div>

    <!-- ── BOTTOM: Filipino / Helper ── -->
    <div class="panel panel--ph">
      <div class="panel-header">
        <span class="panel-flag">🇵🇭</span>
        <span class="panel-lang">Filipino</span>
      </div>

      <div id="dialog-helper" class="dialog-wrap">
        <div class="dialog-card">
          <p id="dialog-helper-label" class="dialog-label"></p>
          <p id="dialog-helper-text"  class="dialog-text"></p>
        </div>
      </div>

      <button id="btn-helper" class="btn-record btn-record--ph">Pindutin<br>at Hawakan</button>

      <div id="status-helper" class="status-bar">
        <span class="status-dot"></span>
        <span id="status-helper-text" class="status-text">Naghihintay...</span>
      </div>
    </div>

  </div>

  <script>
  (() => {
    'use strict';

    /* ─────────────────────────────────────────────────────────────
       CONSTANTS
    ───────────────────────────────────────────────────────────── */
    const LANG_ELDERLY  = 'zh-HK';
    // iOS is picky about Filipino locale. We try fil-PH first,
    // then auto-degrade to tl-PH on language-not-supported error.
    const HELPER_LANGS  = ['fil-PH', 'tl-PH', 'tl'];
    const STOP_DELAY_MS = 350; // Enough for iOS to catch trailing audio

    /* ─────────────────────────────────────────────────────────────
       DOM REFS
    ───────────────────────────────────────────────────────────── */
    const btnElderly    = document.getElementById('btn-elderly');
    const statusElBar   = document.getElementById('status-elderly');
    const statusElText  = document.getElementById('status-elderly-text');
    const dialogEl      = document.getElementById('dialog-elderly');
    const dialogElLabel = document.getElementById('dialog-elderly-label');
    const dialogElText  = document.getElementById('dialog-elderly-text');

    const btnHelper     = document.getElementById('btn-helper');
    const statusPhBar   = document.getElementById('status-helper');
    const statusPhText  = document.getElementById('status-helper-text');
    const dialogPh      = document.getElementById('dialog-helper');
    const dialogPhLabel = document.getElementById('dialog-helper-label');
    const dialogPhText  = document.getElementById('dialog-helper-text');

    /* ─────────────────────────────────────────────────────────────
       STATE
       idle | recording_elderly | recording_helper
            | processing_elderly | processing_helper | translating
    ───────────────────────────────────────────────────────────── */
    let appState      = 'idle';
    let gotResult     = false;   // guards onend from double-handling
    let audioUnlocked = false;
    let helperLangIdx = 0;       // index into HELPER_LANGS array

    /* ─────────────────────────────────────────────────────────────
       SPEECH RECOGNITION SETUP
    ───────────────────────────────────────────────────────────── */
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let rec = null;

    if (SpeechRec) {
      rec = new SpeechRec();
      rec.continuous      = false;
      rec.interimResults  = false;
      rec.maxAlternatives = 1;
    }

    /* ─────────────────────────────────────────────────────────────
       AUDIO UNLOCK (iOS requires a user-gesture-triggered utterance
       before any programmatic speech can play)
    ───────────────────────────────────────────────────────────── */
    function unlockAudio() {
      if (audioUnlocked || !window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance('');
      u.volume = 0;
      window.speechSynthesis.speak(u);
      audioUnlocked = true;
    }
    // Trigger on very first user interaction — not during recording start
    document.addEventListener('touchend', unlockAudio, { once: true, passive: true });
    document.addEventListener('mousedown', unlockAudio, { once: true });

    /* ─────────────────────────────────────────────────────────────
       TRANSLATION  (Google Translate unofficial endpoint)
    ───────────────────────────────────────────────────────────── */
    async function translate(text, from, to) {
      const url =
        `https://translate.googleapis.com/translate_a/single` +
        `?client=gtx&sl=${from}&tl=${to}&dt=t` +
        `&q=${encodeURIComponent(text)}`;
      try {
        const res  = await fetch(url);
        const data = await res.json();
        // data[0] is array of [translatedChunk, originalChunk, ...]
        return data[0].map(chunk => chunk[0]).join('');
      } catch {
        return null;
      }
    }

    /* ─────────────────────────────────────────────────────────────
       TTS
    ───────────────────────────────────────────────────────────── */
    function speak(text, lang) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u    = new SpeechSynthesisUtterance(text);
      u.lang     = lang;
      u.rate     = 0.88;
      u.volume   = 1;
      // 180ms gap ensures iOS cancel() settles before new utterance
      setTimeout(() => window.speechSynthesis.speak(u), 180);
    }

    /* ─────────────────────────────────────────────────────────────
       UI HELPERS
    ───────────────────────────────────────────────────────────── */
    function showDialog(side, label, text) {
      if (side === 'elderly') {
        dialogElLabel.textContent = label;
        dialogElText.textContent  = text;
        dialogEl.classList.add('visible');
      } else {
        dialogPhLabel.textContent = label;
        dialogPhText.textContent  = text;
        dialogPh.classList.add('visible');
      }
    }

    function hideDialog(side) {
      if (side === 'elderly') dialogEl.classList.remove('visible');
      else                    dialogPh.classList.remove('visible');
    }

    function setStatus(side, msg, active = false) {
      if (side === 'elderly') {
        statusElText.textContent = msg;
        statusElBar.classList.toggle('active', active);
      } else {
        statusPhText.textContent = msg;
        statusPhBar.classList.toggle('active', active);
      }
    }

    function setBtnRecording(btn, on) {
      btn.classList.toggle('is-recording', on);
    }

    function resetUI() {
      appState  = 'idle';
      gotResult = false;
      setStatus('elderly', '等待中...');
      setStatus('helper',  'Naghihintay...');
      setBtnRecording(btnElderly, false);
      setBtnRecording(btnHelper,  false);
    }

    /* ─────────────────────────────────────────────────────────────
       SPEECH RECOGNITION EVENTS
    ───────────────────────────────────────────────────────────── */
    if (rec) {

      rec.onresult = async (event) => {
        gotResult = true;
        const transcript = event.results[0][0].transcript.trim();

        if (!transcript) {
          // Got a result but it was empty — treat as no-speech
          const side = appState.includes('helper') ? 'helper' : 'elderly';
          showNoSpeechError(side);
          return;
        }

        const isElderly = appState.includes('elderly');
        appState = 'translating';

        if (isElderly) {
          showDialog('elderly', '你講咗:', transcript);
          hideDialog('helper');
          setStatus('elderly', '翻譯緊...');

          const out = await translate(transcript, 'zh-TW', 'tl');

          if (out) {
            setStatus('elderly', '完成 ✓');
            showDialog('helper', 'Sinabi niya:', out);
            speak(out, HELPER_LANGS[helperLangIdx]);
          } else {
            setStatus('elderly', '翻譯失敗，請重試');
          }

        } else {
          showDialog('helper', 'Sinabi mo:', transcript);
          hideDialog('elderly');
          setStatus('helper', 'Nagsasalin...');

          const out = await translate(transcript, 'tl', 'zh-TW');

          if (out) {
            setStatus('helper', 'Tapos na ✓');
            showDialog('elderly', '佢講:', out);
            speak(out, 'zh-HK');
          } else {
            setStatus('helper', 'Nabigo, subukan muli');
          }
        }

        setTimeout(resetUI, 3500);
      };

      /* ── onerror ──
         KEY FIX: We do NOT call onerror({error:'no-speech'}) manually anymore.
         onend handles the no-result case cleanly via gotResult flag.       */
      rec.onerror = (event) => {
        console.warn('[SpeechRec] error:', event.error);
        const side = appState.includes('helper') ? 'helper' : 'elderly';

        switch (event.error) {
          case 'not-allowed':
          case 'permission-denied':
            setStatus(side, side === 'elderly' ? '❌ 冇咪高峰權限' : '❌ Walang mic access');
            break;

          case 'language-not-supported':
            // Auto-degrade helper language and tell user to retry
            if (side === 'helper' && helperLangIdx < HELPER_LANGS.length - 1) {
              helperLangIdx++;
              setStatus('helper', `Subukan muli (retry)`);
            } else {
              setStatus(side, side === 'elderly' ? '❌ 語言不支援' : '❌ Hindi suportado');
            }
            break;

          case 'network':
            setStatus(side, side === 'elderly' ? '❌ 網絡問題，請重試' : '❌ Network error');
            break;

          case 'no-speech':
          case 'audio-capture':
            showNoSpeechError(side);
            break;

          default:
            setStatus(side, side === 'elderly' ? '錯誤，請再試' : 'Error, ulitin');
        }

        setTimeout(resetUI, 2800);
      };

      /* ── onend ──
         KEY FIX: This is the ONLY place that handles the "no result" case.
         - If gotResult is true → onresult already handled everything, do nothing.
         - If appState is translating/idle → safe to ignore.
         - Otherwise → recognition ended without a transcript.              */
      rec.onend = () => {
        if (gotResult || appState === 'translating' || appState === 'idle') return;

        const side = appState.includes('helper') ? 'helper' : 'elderly';
        showNoSpeechError(side);
        setTimeout(resetUI, 2800);
      };
    }

    function showNoSpeechError(side) {
      if (side === 'elderly') setStatus('elderly', '聽唔清，講大聲啲 🔊');
      else                    setStatus('helper',  'Hindi marinig, ulitin 🔊');
    }

    /* ─────────────────────────────────────────────────────────────
       PUSH-TO-TALK LOGIC
    ───────────────────────────────────────────────────────────── */
    function startRec(speaker) {
      if (appState !== 'idle') return;
      if (!rec) {
        alert('請使用 Safari 瀏覽器。\nGamitin ang Safari browser.');
        return;
      }

      gotResult = false;
      appState  = `recording_${speaker}`;
      rec.lang  = speaker === 'elderly'
        ? LANG_ELDERLY
        : HELPER_LANGS[helperLangIdx];

      try {
        rec.start();
      } catch (e) {
        // InvalidStateError = already running (shouldn't happen, but guard it)
        console.error('[SpeechRec] start() failed:', e);
        appState = 'idle';
        return;
      }

      if (speaker === 'elderly') {
        hideDialog('helper');
        setStatus('elderly', '🎙 聽緊你講嘢...', true);
        setBtnRecording(btnElderly, true);
      } else {
        hideDialog('elderly');
        setStatus('helper', '🎙 Nakikinig...', true);
        setBtnRecording(btnHelper, true);
      }
    }

    function stopRec(speaker) {
      if (appState !== `recording_${speaker}`) return;

      appState = `processing_${speaker}`;
      setBtnRecording(speaker === 'elderly' ? btnElderly : btnHelper, false);

      if (speaker === 'elderly') setStatus('elderly', '處理中...');
      else                        setStatus('helper',  'Pinoproseso...');

      if (rec) {
        // KEY FIX: 350ms gives iOS speech API time to process trailing audio
        // before we cut the session. 800ms was too long and caused state confusion.
        setTimeout(() => {
          try { rec.stop(); } catch (_) { /* already stopped */ }
        }, STOP_DELAY_MS);
      }
    }

    /* ─────────────────────────────────────────────────────────────
       EVENT BINDING
    ───────────────────────────────────────────────────────────── */
    // Touch (primary path on iPhone)
    btnElderly.addEventListener('touchstart',  e => { e.preventDefault(); startRec('elderly'); }, { passive: false });
    btnElderly.addEventListener('touchend',    e => { e.preventDefault(); stopRec('elderly');  }, { passive: false });
    btnElderly.addEventListener('touchcancel', ()  => stopRec('elderly'));

    btnHelper.addEventListener('touchstart',  e => { e.preventDefault(); startRec('helper'); }, { passive: false });
    btnHelper.addEventListener('touchend',    e => { e.preventDefault(); stopRec('helper');  }, { passive: false });
    btnHelper.addEventListener('touchcancel', ()  => stopRec('helper'));

    // Mouse (desktop testing)
    btnElderly.addEventListener('mousedown',  () => startRec('elderly'));
    btnElderly.addEventListener('mouseup',    () => stopRec('elderly'));
    btnElderly.addEventListener('mouseleave', () => { if (appState === 'recording_elderly') stopRec('elderly'); });

    btnHelper.addEventListener('mousedown',  () => startRec('helper'));
    btnHelper.addEventListener('mouseup',    () => stopRec('helper'));
    btnHelper.addEventListener('mouseleave', () => { if (appState === 'recording_helper') stopRec('helper'); });

    /* ─────────────────────────────────────────────────────────────
       SERVICE WORKER
    ───────────────────────────────────────────────────────────── */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

  })();
  </script>
</body>
</html>
