<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Translator Kiosk (Plan B)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="翻譯機">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }
        ::-webkit-scrollbar { display: none; }
        
        @media screen and (orientation: landscape) {
            #app-container { display: none !important; }
            #landscape-warning { display: flex !important; }
        }
    </style>
</head>
<body class="h-screen w-screen bg-black overflow-hidden font-sans">

    <div id="landscape-warning" class="hidden h-screen w-screen bg-black text-white flex-col items-center justify-center p-8 text-center z-[999]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 mb-6 text-red-500 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
        </svg>
        <h1 class="text-4xl font-bold mb-4">請將手機轉為直直擺放</h1>
        <p class="text-2xl text-gray-400">Mangyaring hawakan ang telepono nang patayo.</p>
    </div>

    <div id="app-container" class="flex flex-col h-full w-full">
        
        <!-- 上半部：老人家 (廣東話) -->
        <div class="flex-1 bg-[#002B5B] flex flex-col justify-between items-center py-10 px-6 rotate-180">
            <h1 class="text-white text-3xl font-bold">廣東話</h1>
            
            <div id="dialog-elderly" class="opacity-0 transition-opacity duration-300 bg-white text-[#002B5B] w-full min-h-[100px] max-h-[30vh] overflow-y-auto rounded-2xl p-4 shadow-xl flex flex-col justify-center text-3xl font-black text-center leading-tight">
            </div>

            <button id="btn-elderly" class="bg-[#F9A826] text-[#002B5B] w-40 h-40 md:w-48 md:h-48 rounded-full text-3xl font-black shadow-[0_10px_0_0_#B8720A] active:shadow-[0_0px_0_0_#B8720A] active:translate-y-[10px] transition-all duration-75 flex items-center justify-center shrink-0 touch-none select-none">
                撳住講
            </button>
            
            <div id="status-elderly" class="text-white/70 text-xl text-center h-8 font-medium">
                等待中...
            </div>
        </div>

        <div class="h-2 w-full bg-black z-10 shrink-0"></div>

        <!-- 下半部：工人姐姐 (Tagalog) -->
        <div class="flex-1 bg-[#60A5FA] flex flex-col justify-between items-center py-10 px-6">
            <h1 class="text-[#002B5B] text-3xl font-bold">Tagalog</h1>
            
            <div id="dialog-helper" class="opacity-0 transition-opacity duration-300 bg-white text-[#002B5B] w-full min-h-[100px] max-h-[30vh] overflow-y-auto rounded-2xl p-4 shadow-xl flex flex-col justify-center text-2xl font-bold text-center leading-tight">
            </div>

            <button id="btn-helper" class="bg-[#F9A826] text-[#002B5B] w-40 h-40 md:w-48 md:h-48 rounded-full text-2xl font-black shadow-[0_10px_0_0_#B8720A] active:shadow-[0_0px_0_0_#B8720A] active:translate-y-[10px] transition-all duration-75 flex items-center justify-center text-center leading-tight shrink-0 touch-none select-none">
                Pindutin<br>at Hawakan
            </button>
            
            <div id="status-helper" class="text-[#002B5B]/70 text-xl text-center h-8 font-medium">
                Naghihintay...
            </div>
        </div>
        
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            console.warn("瀏覽器唔支援 Web Speech API。");
        }

        const btnElderly = document.getElementById('btn-elderly');
        const statusElderly = document.getElementById('status-elderly');
        const dialogElderly = document.getElementById('dialog-elderly');
        
        const btnHelper = document.getElementById('btn-helper');
        const statusHelper = document.getElementById('status-helper');
        const dialogHelper = document.getElementById('dialog-helper');

        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
        }
        
        let appState = 'idle'; 
        let audioUnlocked = false; 

        // 解鎖機制移至「放手」時執行，避開開咪衝突
        function unlockAudio() {
            if (!audioUnlocked && window.speechSynthesis) {
                const utterance = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(utterance);
                audioUnlocked = true;
            }
        }

        async function translateText(text, sourceLang, targetLang) {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURI(text)}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                return data[0].map(x => x[0]).join('');
            } catch (err) {
                console.error("Translation error:", err);
                return "翻譯失敗 (Translation Failed)";
            }
        }

        function speakText(text, lang) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang; 
            utterance.rate = 0.9; 
            setTimeout(() => { window.speechSynthesis.speak(utterance); }, 100);
        }

        function resetUI() {
            appState = 'idle';
            statusElderly.innerText = "等待中...";
            statusHelper.innerText = "Naghihintay...";
            btnElderly.classList.remove("bg-yellow-200");
            btnHelper.classList.remove("bg-yellow-200");
        }

        if (recognition) {
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                
                if (!transcript || transcript.trim() === "") {
                    recognition.onerror({error: 'no-speech'});
                    return;
                }
                
                const currentSpeaker = appState.includes('elderly') ? 'elderly' : 'helper';
                appState = 'translating'; 
                
                if (currentSpeaker === 'elderly') {
                    dialogElderly.innerHTML = `<span class="text-lg text-gray-500 block mb-1">你講咗:</span>${transcript}`;
                    dialogElderly.classList.remove("opacity-0");
                    dialogElderly.classList.add("opacity-100");
                    
                    statusElderly.innerText = "翻譯緊...";
                    const translated = await translateText(transcript, 'zh-TW', 'tl');
                    
                    statusElderly.innerText = "翻譯完成";
                    dialogHelper.innerText = translated;
                    dialogHelper.classList.remove("opacity-0");
                    dialogHelper.classList.add("opacity-100");
                    
                    speakText(translated, 'fil-PH');
                    setTimeout(resetUI, 2500);
                } 
                else if (currentSpeaker === 'helper') {
                    dialogHelper.innerHTML = `<span class="text-sm text-gray-500 block mb-1">Sinabi mo:</span>${transcript}`;
                    dialogHelper.classList.remove("opacity-0");
                    dialogHelper.classList.add("opacity-100");

                    statusHelper.innerText = "Nagsasalin...";
                    const translated = await translateText(transcript, 'tl', 'zh-TW');
                    
                    statusHelper.innerText = "Tapos na";
                    dialogElderly.innerText = translated;
                    dialogElderly.classList.remove("opacity-0");
                    dialogElderly.classList.add("opacity-100");
                    
                    speakText(translated, 'zh-HK');
                    setTimeout(resetUI, 2500);
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech error:", event.error);
                let errorMsg = "收音失敗 (Error)";
                let errorHelper = "Error";
                
                if (event.error === 'language-not-supported') {
                    errorMsg = "請先喺設定加菲律賓鍵盤!";
                    errorHelper = "Idagdag ang Filipino keyboard";
                } else if (event.error === 'not-allowed') {
                    errorMsg = "冇咪高峰權限";
                    errorHelper = "Walang mic access";
                } else if (event.error === 'no-speech') {
                    errorMsg = "聽唔清楚，講大聲啲";
                    errorHelper = "Hindi marinig, ulitin";
                }

                if (appState.includes('elderly')) {
                    statusElderly.innerText = errorMsg;
                } else if (appState.includes('helper')) {
                    statusHelper.innerText = errorHelper;
                }
                
                setTimeout(resetUI, 2500);
            };

            recognition.onend = () => {
                if (appState === 'processing_elderly' || appState === 'processing_helper' || appState.includes('recording')) {
                    console.log("Speech recognition ended without result.");
                    recognition.onerror({error: 'no-speech'});
                }
            };
        }

        // --- Event Handlers ---

        const startElderly = (e) => {
            if (e) e.preventDefault();
            if (appState !== 'idle') return; 
            
            appState = 'recording_elderly';
            
            if (recognition) {
                recognition.lang = 'zh-HK';
                try { recognition.start(); } catch(err) { console.error(err); resetUI(); return; }
            }
            
            statusElderly.innerText = "聽緊你講嘢...";
            statusElderly.classList.add("text-yellow-400");
            btnElderly.classList.add("bg-yellow-200");
            dialogHelper.classList.remove("opacity-100"); 
            dialogHelper.classList.add("opacity-0");
        };

        const stopElderly = (e) => {
            if (e) e.preventDefault();
            if (appState !== 'recording_elderly') return; 
            
            unlockAudio(); // 放手先解鎖 Audio，避免撞車
            appState = 'processing_elderly';
            
            btnElderly.classList.remove("bg-yellow-200");
            statusElderly.classList.remove("text-yellow-400");
            statusElderly.innerText = "處理中..."; // 提早轉狀態安撫用家
            
            if (recognition) {
                // 核心修復：延遲 800ms 先截斷，等 Apple API 處理埋尾音
                setTimeout(() => {
                    if (appState === 'processing_elderly') recognition.stop();
                }, 800);
            }
        };

        const startHelper = (e) => {
            if (e) e.preventDefault();
            if (appState !== 'idle') return; 
            
            appState = 'recording_helper';
            
            if (recognition) {
                recognition.lang = 'fil-PH';
                try { recognition.start(); } catch(err) { console.error(err); resetUI(); return; }
            }
            
            statusHelper.innerText = "Nakikinig...";
            statusHelper.classList.add("text-white");
            btnHelper.classList.add("bg-yellow-200");
            dialogElderly.classList.remove("opacity-100"); 
            dialogElderly.classList.add("opacity-0");
        };

        const stopHelper = (e) => {
            if (e) e.preventDefault();
            if (appState !== 'recording_helper') return; 
            
            unlockAudio(); 
            appState = 'processing_helper';
            
            btnHelper.classList.remove("bg-yellow-200");
            statusHelper.classList.remove("text-white");
            statusHelper.innerText = "Pinoproseso...";
            
            if (recognition) {
                setTimeout(() => {
                    if (appState === 'processing_helper') recognition.stop();
                }, 800);
            }
        };

        btnElderly.addEventListener('touchstart', startElderly, {passive: false});
        btnElderly.addEventListener('touchend', stopElderly);
        btnElderly.addEventListener('touchcancel', stopElderly);

        btnHelper.addEventListener('touchstart', startHelper, {passive: false});
        btnHelper.addEventListener('touchend', stopHelper);
        btnHelper.addEventListener('touchcancel', stopHelper);
        
        btnElderly.addEventListener('mousedown', startElderly);
        btnElderly.addEventListener('mouseup', stopElderly);
        btnElderly.addEventListener('mouseleave', stopElderly); 

        btnHelper.addEventListener('mousedown', startHelper);
        btnHelper.addEventListener('mouseup', stopHelper);
        btnHelper.addEventListener('mouseleave', stopHelper);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(()=>{});
            });
        }
    </script>
</body>
</html>
