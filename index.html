<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>廣東話 ↔ Filipino 翻譯</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="翻譯機">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@700;900&family=Barlow:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --hk-bg:      #14243D;
      --ph-bg:      #0A3323;
      --gold:       #F5A623;
      --gold-dark:  #9B6510;
      --gold-light: #FFD166;
      --white:      #FFFFFF;
      --muted:      rgba(255,255,255,0.4);
      --btn-size:   148px;
    }
    html, body {
      height: 100%; width: 100%;
      overflow: hidden; overscroll-behavior: none;
      -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
    }
    body { background: #000; font-family: 'Barlow', 'Noto Sans HK', sans-serif; }
    ::-webkit-scrollbar { display: none; }

    /* Landscape */
    #landscape-warning {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: #08080f; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem; color: #fff;
    }
    #landscape-warning .ico { font-size: 4rem; margin-bottom: 1rem; }
    #landscape-warning h1 { font-size: 1.9rem; font-weight: 900; margin-bottom: .4rem; }
    #landscape-warning p  { font-size: 1.2rem; color: var(--muted); }
    @media screen and (orientation: landscape) {
      #app-container { display: none !important; }
      #landscape-warning { display: flex !important; }
    }

    /* App */
    #app-container { display: flex; flex-direction: column; height: 100%; }

    /* Panels */
    .panel {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 1.8rem 1.5rem 1.5rem;
      overflow: hidden; position: relative;
      transition: background 0.3s ease;
    }
    .panel--hk { background: var(--hk-bg); transform: rotate(180deg); }
    .panel--ph { background: var(--ph-bg); }
    .panel--hk.is-active { background: #1a3257; }
    .panel--ph.is-active { background: #0d4a30; }

    /* Header */
    .panel-header {
      display: flex; align-items: center; gap: .6rem;
      position: relative; z-index: 1; flex-shrink: 0;
    }
    .panel-flag { font-size: 2rem; line-height: 1; }
    .panel-lang {
      font-size: 1.45rem; font-weight: 900; color: var(--white);
      letter-spacing: .06em; text-transform: uppercase;
    }

    /* Dialog */
    .dialog-wrap {
      width: 100%; max-height: 28vh; overflow-y: auto;
      position: relative; z-index: 1; border-radius: 1.25rem;
      opacity: 0; transform: translateY(-8px) scale(.97);
      transition: opacity .28s ease, transform .28s ease;
      pointer-events: none;
    }
    .dialog-wrap.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .dialog-card {
      background: rgba(255,255,255,.97); border-radius: 1.25rem;
      padding: 1rem 1.2rem; box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }
    .dialog-label {
      font-size: .6rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .12em; color: #aaa; margin-bottom: .35rem;
    }
    .dialog-text {
      font-weight: 900; text-align: center; line-height: 1.3;
      word-break: break-word; font-family: 'Noto Sans HK', 'Barlow', sans-serif;
    }
    .panel--hk .dialog-text { color: #0D1A2E; font-size: 1.55rem; }
    .panel--ph .dialog-text { color: #061F15; font-size: 1.3rem; }

    /* Record button */
    .btn-record {
      position: relative; z-index: 2;
      width: var(--btn-size); height: var(--btn-size);
      border-radius: 50%; border: none; cursor: pointer; outline: none;
      touch-action: none; -webkit-tap-highlight-color: transparent;
      background: var(--gold); box-shadow: 0 9px 0 0 var(--gold-dark);
      color: #1a1100; font-family: 'Noto Sans HK', 'Barlow', sans-serif;
      font-weight: 900; text-align: center; line-height: 1.25;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; flex-shrink: 0;
      transition: transform .08s ease, box-shadow .08s ease, background .2s ease;
      overflow: hidden;
    }
    .btn-record--hk { font-size: 1.35rem; }
    .btn-record--ph { font-size: 1rem; }
    .btn-label { transition: opacity .2s ease; }

    .btn-record.is-pressed {
      transform: translateY(5px); box-shadow: 0 4px 0 0 var(--gold-dark);
    }

    /* Waveform bars */
    .btn-wave {
      display: none; align-items: flex-end; justify-content: center;
      gap: 5px; height: 52px; width: 80%;
    }
    .btn-wave span {
      display: block; width: 8px; border-radius: 4px;
      background: rgba(26,17,0,0.75); transform-origin: bottom;
      animation: wave-idle 1.4s ease-in-out infinite;
    }
    .btn-wave span:nth-child(1) { animation-delay: 0s;   height: 20px; }
    .btn-wave span:nth-child(2) { animation-delay: .18s; height: 32px; }
    .btn-wave span:nth-child(3) { animation-delay: .36s; height: 44px; }
    .btn-wave span:nth-child(4) { animation-delay: .54s; height: 32px; }
    .btn-wave span:nth-child(5) { animation-delay: .72s; height: 20px; }
    @keyframes wave-idle {
      0%, 100% { transform: scaleY(.25); opacity: .5; }
      50%       { transform: scaleY(1);  opacity: 1;  }
    }
    .btn-record.has-sound .btn-wave span {
      animation-name: wave-sound; animation-duration: .5s;
    }
    @keyframes wave-sound {
      0%, 100% { transform: scaleY(.5); }
      50%       { transform: scaleY(1.1); }
    }
    .btn-record.mic-live .btn-label { display: none; }
    .btn-record.mic-live .btn-wave  { display: flex; }
    .btn-record.mic-live::after {
      content: ''; position: absolute; inset: -10px; border-radius: 50%;
      border: 3px solid var(--gold-light);
      animation: pulse-ring 1.1s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { opacity: .8; transform: scale(1); }
      100% { opacity: 0;  transform: scale(1.35); }
    }

    /* Fullscreen recording overlay */
    #rec-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      align-items: center; justify-content: center;
      flex-direction: column; pointer-events: none;
    }
    #rec-overlay.visible { display: flex; }

    .rec-banner {
      position: absolute; left: 0; right: 0; height: 56px;
      display: flex; align-items: center; justify-content: center;
      gap: .5rem; font-size: 1rem; font-weight: 800;
      letter-spacing: .04em; pointer-events: none;
      background: rgba(0,0,0,.55); color: var(--muted);
      transition: background .3s, color .3s;
    }
    #rec-banner-top    { top: 0; }
    #rec-banner-bottom { bottom: 0; }
    .rec-banner.active { background: #c1121f; color: #fff; }

    .rec-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: currentColor;
    }
    .rec-banner.active .rec-dot { animation: dot-blink .6s ease-in-out infinite; }
    @keyframes dot-blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0; }
    }

    #rec-init-msg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,.78); color: #fff;
      border-radius: 1.5rem; padding: .9rem 1.6rem;
      font-size: 1.05rem; font-weight: 800;
      text-align: center; line-height: 1.5;
      pointer-events: none; white-space: nowrap;
      opacity: 0; transition: opacity .25s;
    }
    #rec-init-msg.visible { opacity: 1; }

    /* Status */
    .status-bar {
      display: flex; align-items: center; justify-content: center;
      gap: .4rem; min-height: 22px;
      position: relative; z-index: 1; flex-shrink: 0;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: background .2s;
    }
    .status-text {
      font-size: .9rem; font-weight: 700;
      color: var(--muted); letter-spacing: .01em; transition: color .2s;
    }
    .status-bar.active .status-dot {
      background: var(--gold); animation: dot-blink .7s ease-in-out infinite;
    }
    .status-bar.active .status-text { color: var(--gold-light); }

    #divider { height: 3px; background: #000; flex-shrink: 0; z-index: 10; }
  </style>
</head>
<body>

  <div id="landscape-warning">
    <div class="ico">📱</div>
    <h1>請將手機轉為直向</h1>
    <p>Mangyaring hawakan ang telepono nang patayo.</p>
  </div>

  <!-- Fullscreen recording overlay -->
  <div id="rec-overlay">
    <div id="rec-banner-top"    class="rec-banner"><span class="rec-dot"></span><span id="rec-msg-top"></span></div>
    <div id="rec-banner-bottom" class="rec-banner"><span class="rec-dot"></span><span id="rec-msg-bot"></span></div>
    <div id="rec-init-msg"></div>
  </div>

  <div id="app-container">

    <!-- TOP: Cantonese / Elderly (rotated) -->
    <div id="panel-elderly" class="panel panel--hk">
      <div class="panel-header">
        <span class="panel-flag">🇭🇰</span>
        <span class="panel-lang">廣東話</span>
      </div>
      <div id="dialog-elderly" class="dialog-wrap">
        <div class="dialog-card">
          <p id="dialog-elderly-label" class="dialog-label"></p>
          <p id="dialog-elderly-text"  class="dialog-text"></p>
        </div>
      </div>
      <button id="btn-elderly" class="btn-record btn-record--hk">
        <span class="btn-label">撳住講</span>
        <div class="btn-wave"><span></span><span></span><span></span><span></span><span></span></div>
      </button>
      <div id="status-elderly" class="status-bar">
        <span class="status-dot"></span>
        <span id="status-elderly-text" class="status-text">等待中...</span>
      </div>
    </div>

    <div id="divider"></div>

    <!-- BOTTOM: Filipino / Helper -->
    <div id="panel-helper" class="panel panel--ph">
      <div class="panel-header">
        <span class="panel-flag">🇵🇭</span>
        <span class="panel-lang">Filipino</span>
      </div>
      <div id="dialog-helper" class="dialog-wrap">
        <div class="dialog-card">
          <p id="dialog-helper-label" class="dialog-label"></p>
          <p id="dialog-helper-text"  class="dialog-text"></p>
        </div>
      </div>
      <button id="btn-helper" class="btn-record btn-record--ph">
        <span class="btn-label">Pindutin<br>at Hawakan</span>
        <div class="btn-wave"><span></span><span></span><span></span><span></span><span></span></div>
      </button>
      <div id="status-helper" class="status-bar">
        <span class="status-dot"></span>
        <span id="status-helper-text" class="status-text">Naghihintay...</span>
      </div>
    </div>

  </div>

  <script>
  (() => {
    'use strict';

    const LANG_ELDERLY  = 'zh-HK';
    const HELPER_LANGS  = ['fil-PH', 'tl-PH', 'tl'];
    const STOP_DELAY    = 350;

    const panelEl      = document.getElementById('panel-elderly');
    const panelPh      = document.getElementById('panel-helper');
    const btnEl        = document.getElementById('btn-elderly');
    const statusElBar  = document.getElementById('status-elderly');
    const statusElText = document.getElementById('status-elderly-text');
    const dialogEl     = document.getElementById('dialog-elderly');
    const dialogElLbl  = document.getElementById('dialog-elderly-label');
    const dialogElTxt  = document.getElementById('dialog-elderly-text');
    const btnPh        = document.getElementById('btn-helper');
    const statusPhBar  = document.getElementById('status-helper');
    const statusPhText = document.getElementById('status-helper-text');
    const dialogPh     = document.getElementById('dialog-helper');
    const dialogPhLbl  = document.getElementById('dialog-helper-label');
    const dialogPhTxt  = document.getElementById('dialog-helper-text');
    const overlay      = document.getElementById('rec-overlay');
    const bannerTop    = document.getElementById('rec-banner-top');
    const bannerBot    = document.getElementById('rec-banner-bottom');
    const msgTop       = document.getElementById('rec-msg-top');
    const msgBot       = document.getElementById('rec-msg-bot');
    const initMsg      = document.getElementById('rec-init-msg');

    let appState        = 'idle';
    let gotResult       = false;
    let audioUnlocked   = false;
    let helperLangIdx   = 0;
    let touchInProgress = false;

    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let rec = null;
    if (SpeechRec) {
      rec = new SpeechRec();
      rec.continuous      = false;
      rec.interimResults  = false;
      rec.maxAlternatives = 1;
    }

    function unlockAudio() {
      if (audioUnlocked || !window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance(''); u.volume = 0;
      window.speechSynthesis.speak(u); audioUnlocked = true;
    }
    document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });
    document.addEventListener('mousedown',  unlockAudio, { once: true });

    async function translate(text, from, to) {
      const url = 'https://translate.googleapis.com/translate_a/single'
        + '?client=gtx&sl=' + from + '&tl=' + to + '&dt=t'
        + '&q=' + encodeURIComponent(text);
      try {
        const res = await fetch(url); const data = await res.json();
        return data[0].map(function(c){ return c[0]; }).join('');
      } catch(e) { return null; }
    }

    function speak(text, lang) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang; u.rate = 0.88; u.volume = 1;
      setTimeout(function(){ window.speechSynthesis.speak(u); }, 180);
    }

    function showDialog(side, label, text) {
      var lbl, txt, wrap;
      if (side === 'elderly') { lbl = dialogElLbl; txt = dialogElTxt; wrap = dialogEl; }
      else                    { lbl = dialogPhLbl; txt = dialogPhTxt; wrap = dialogPh; }
      lbl.textContent = label; txt.textContent = text;
      wrap.classList.add('visible');
    }
    function hideDialog(side) {
      (side === 'elderly' ? dialogEl : dialogPh).classList.remove('visible');
    }

    function setStatus(side, msg, active) {
      var bar  = side === 'elderly' ? statusElBar  : statusPhBar;
      var txt  = side === 'elderly' ? statusElText : statusPhText;
      txt.textContent = msg;
      bar.classList.toggle('active', !!active);
    }

    function setRecordingVisual(speaker, phase) {
      var btn    = speaker === 'elderly' ? btnEl   : btnPh;
      var panel  = speaker === 'elderly' ? panelEl : panelPh;
      var banner = speaker === 'elderly' ? bannerTop : bannerBot;
      var msgEl  = speaker === 'elderly' ? msgTop    : msgBot;

      btn.classList.remove('is-pressed','mic-live','has-sound');
      panel.classList.remove('is-active');

      if (phase === 'off') {
        overlay.classList.remove('visible');
        bannerTop.classList.remove('active');
        bannerBot.classList.remove('active');
        initMsg.classList.remove('visible');
        return;
      }

      overlay.classList.add('visible');
      panel.classList.add('is-active');
      btn.classList.add('is-pressed');

      if (phase === 'starting') {
        banner.classList.remove('active');
        msgEl.textContent = speaker === 'elderly' ? '⏳  開緊咪...' : '⏳  Sinisimulan...';
        initMsg.textContent = speaker === 'elderly'
          ? '🎙  等一等，準備中...'
          : '🎙  Sandali, inihahanda...';
        initMsg.classList.add('visible');
      }

      if (phase === 'live') {
        btn.classList.add('mic-live');
        banner.classList.add('active');
        msgEl.textContent = speaker === 'elderly'
          ? '🔴  咪已開 — 請而家講嘢！'
          : '🔴  Naka-on ang mic — Magsalita na!';
        initMsg.classList.remove('visible');
      }

      if (phase === 'sound') {
        btn.classList.add('mic-live','has-sound');
        banner.classList.add('active');
        msgEl.textContent = speaker === 'elderly'
          ? '🔴  偵測到聲音...'
          : '🔴  Maririnig kita...';
      }
    }

    function resetUI() {
      appState = 'idle'; gotResult = false;
      setStatus('elderly', '等待中...');
      setStatus('helper',  'Naghihintay...');
      setRecordingVisual('elderly', 'off');
      setRecordingVisual('helper',  'off');
    }

    if (rec) {

      // CRITICAL: onaudiostart = mic is physically open and capturing.
      // This is when we upgrade the UI from "starting" to "live".
      rec.onaudiostart = function() {
        var speaker = appState.includes('helper') ? 'helper' : 'elderly';
        setRecordingVisual(speaker, 'live');
        setStatus(speaker,
          speaker === 'elderly' ? '🔴 咪開緊，請講嘢！' : '🔴 Naka-on! Magsalita!',
          true);
      };

      rec.onsoundstart = function() {
        var speaker = appState.includes('helper') ? 'helper' : 'elderly';
        setRecordingVisual(speaker, 'sound');
        setStatus(speaker,
          speaker === 'elderly' ? '聲音偵測中...' : 'Maririnig kita...', true);
      };

      rec.onspeechstart = function() {
        var speaker = appState.includes('helper') ? 'helper' : 'elderly';
        setStatus(speaker,
          speaker === 'elderly' ? '識別緊你嘅說話...' : 'Kinikilala ang salita...', true);
      };

      rec.onresult = async function(event) {
        gotResult = true;
        var transcript = event.results[0][0].transcript.trim();
        if (!transcript) {
          var s0 = appState.includes('helper') ? 'helper' : 'elderly';
          setRecordingVisual(s0, 'off'); showNoSpeech(s0);
          setTimeout(resetUI, 2800); return;
        }

        var isElderly = appState.includes('elderly');
        appState = 'translating';
        setRecordingVisual(isElderly ? 'elderly' : 'helper', 'off');

        if (isElderly) {
          showDialog('elderly', '你講咗:', transcript);
          hideDialog('helper');
          setStatus('elderly', '翻譯緊...');
          var out = await translate(transcript, 'zh-TW', 'tl');
          if (out) {
            setStatus('elderly', '完成 ✓');
            showDialog('helper', 'Sinabi niya:', out);
            speak(out, HELPER_LANGS[helperLangIdx]);
          } else { setStatus('elderly', '翻譯失敗，請重試'); }
        } else {
          showDialog('helper', 'Sinabi mo:', transcript);
          hideDialog('elderly');
          setStatus('helper', 'Nagsasalin...');
          var out2 = await translate(transcript, 'tl', 'zh-TW');
          if (out2) {
            setStatus('helper', 'Tapos na ✓');
            showDialog('elderly', '佢講:', out2);
            speak(out2, 'zh-HK');
          } else { setStatus('helper', 'Nabigo, subukan muli'); }
        }
        setTimeout(resetUI, 3500);
      };

      rec.onerror = function(event) {
        console.warn('[SpeechRec]', event.error);
        var side = appState.includes('helper') ? 'helper' : 'elderly';
        setRecordingVisual(side, 'off');
        switch (event.error) {
          case 'not-allowed':
          case 'permission-denied':
            setStatus(side, side === 'elderly' ? '❌ 未批准咪高峰權限' : '❌ Walang mic access'); break;
          case 'language-not-supported':
            if (side === 'helper' && helperLangIdx < HELPER_LANGS.length - 1) {
              helperLangIdx++;
              setStatus('helper', 'Subukan muli ▶');
            } else {
              setStatus(side, side === 'elderly' ? '❌ 語言不支援' : '❌ Hindi suportado');
            }
            break;
          case 'network':
            setStatus(side, side === 'elderly' ? '❌ 網絡問題' : '❌ Network error'); break;
          default:
            showNoSpeech(side);
        }
        setTimeout(resetUI, 2800);
      };

      // KEY FIX: onend is the sole handler for "finished without result".
      // gotResult flag ensures onresult and onend never both handle the same session.
      rec.onend = function() {
        if (gotResult || appState === 'translating' || appState === 'idle') return;
        var side = appState.includes('helper') ? 'helper' : 'elderly';
        setRecordingVisual(side, 'off');
        showNoSpeech(side);
        setTimeout(resetUI, 2800);
      };
    }

    function showNoSpeech(side) {
      setStatus(side, side === 'elderly' ? '聽唔清，講大聲啲 🔊' : 'Hindi marinig, ulitin 🔊');
    }

    function startRec(speaker) {
      if (appState !== 'idle') return;
      if (!rec) { alert('請使用 Safari。\nGamitin ang Safari.'); return; }
      gotResult = false;
      appState  = 'recording_' + speaker;
      rec.lang  = speaker === 'elderly' ? LANG_ELDERLY : HELPER_LANGS[helperLangIdx];
      try { rec.start(); }
      catch(e) { console.error('[SpeechRec] start() failed:', e); appState = 'idle'; return; }
      setRecordingVisual(speaker, 'starting');
      setStatus(speaker,
        speaker === 'elderly' ? '⏳ 等開咪...' : '⏳ Paghihintay sa mic...', true);
      hideDialog(speaker === 'elderly' ? 'helper' : 'elderly');
    }

    function stopRec(speaker) {
      if (appState !== 'recording_' + speaker) return;
      appState = 'processing_' + speaker;
      if (speaker === 'elderly') setStatus('elderly', '處理中...');
      else                        setStatus('helper',  'Pinoproseso...');
      if (rec) {
        setTimeout(function(){ try { rec.stop(); } catch(e){} }, STOP_DELAY);
      }
    }

    // KEY iOS FIX: touchstart is passive (no preventDefault).
    // preventDefault on touchstart can block iOS from granting mic access
    // for speech recognition. touchInProgress flag prevents double-fire
    // from the fallback mousedown handler.
    function bindBtn(btn, speaker) {
      btn.addEventListener('touchstart', function() {
        touchInProgress = true;
        startRec(speaker);
      }, { passive: true });

      btn.addEventListener('touchend', function() {
        stopRec(speaker);
        setTimeout(function(){ touchInProgress = false; }, 400);
      }, { passive: true });

      btn.addEventListener('touchcancel', function() {
        stopRec(speaker);
        setTimeout(function(){ touchInProgress = false; }, 400);
      }, { passive: true });

      btn.addEventListener('mousedown', function() {
        if (touchInProgress) return;
        startRec(speaker);
      });
      btn.addEventListener('mouseup', function() {
        if (touchInProgress) return;
        stopRec(speaker);
      });
      btn.addEventListener('mouseleave', function() {
        if (touchInProgress) return;
        if (appState === 'recording_' + speaker) stopRec(speaker);
      });
    }

    bindBtn(btnEl, 'elderly');
    bindBtn(btnPh, 'helper');

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').catch(function(){});
      });
    }
  })();
  </script>
</body>
</html>
